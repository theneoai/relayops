<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RelayOps - 自动驾驶研发工作流平台</title>
  <link rel="stylesheet" href="/app/style.css">
</head>
<body>
  <div class="layout">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>🚗 RelayOps</h1>
        <div class="subtitle">自动驾驶研发工作流平台</div>
      </div>
      <nav class="nav-menu">
        <div class="nav-item active" data-page="dashboard">
          <span class="icon">📊</span>
          <span>仪表盘</span>
        </div>
        <div class="nav-item" data-page="agents">
          <span class="icon">🤖</span>
          <span>Agent管理</span>
        </div>
        <div class="nav-item" data-page="knowledge">
          <span class="icon">📚</span>
          <span>知识库</span>
        </div>
        <div class="nav-item" data-page="tasks">
          <span class="icon">⏰</span>
          <span>定时任务</span>
        </div>
        <div class="nav-item" data-page="executions">
          <span class="icon">📋</span>
          <span>执行历史</span>
        </div>
        <div class="nav-item" data-page="tools">
          <span class="icon">🛠️</span>
          <span>工具服务</span>
        </div>
      </nav>
      <div class="sidebar-footer">
        v0.1.0 · Agent Platform
      </div>
    </aside>

    <!-- 主内容 -->
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-title" id="page-title">仪表盘</div>
        <div class="topbar-actions">
          <div class="api-status" id="api-status">
            <span>●</span> 连接中...
          </div>
        </div>
      </header>
      <main class="page-content" id="page-content">
        <div class="loading"><div class="spinner"></div> 加载中...</div>
      </main>
    </div>
  </div>

  <!-- 模态框容器 -->
  <div id="modal-container"></div>

  <script src="/app/app.js"></script>
</body>
</html>
